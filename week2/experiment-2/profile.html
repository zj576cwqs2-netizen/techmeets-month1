<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>プロフィール</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #f0f0f0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      background: #fff;
      width: 400px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
      padding: 40px 32px;
      text-align: center;
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 20px;
    }

    .name {
      font-family: 'Segoe UI', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: #222;
      margin-bottom: 8px;
    }

    .comment {
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.95rem;
      color: #666;
      margin-bottom: 24px;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .badge {
      background: #ede9ff;
      color: #6c63ff;
      border-radius: 20px;
      padding: 5px 16px;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <img class="avatar" src="https://placehold.jp/100x100.png" alt="アイコン">
    <div class="name">山田 太郎</div>
    <div class="comment">UIを作るのが好きなエンジニアです。</div>
    <div class="badges">
      <span class="badge">HTML</span>
      <span class="badge">CSS</span>
      <span class="badge">JavaScript</span>
      <span class="badge">UI/UX</span>
    </div>
  </div>
</body>
</html>
